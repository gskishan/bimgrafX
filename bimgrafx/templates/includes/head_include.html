<!-- UTM Capture for Lead Source Tracking -->
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var utmFields = ['custom_utm_source', 'custom_utm_medium', 'custom_utm_campaign', 'custom_utm_content'];
  utmFields.forEach(function(field) {
    var value = params.get(field);
    if (value) {
      sessionStorage.setItem(field, value);
    }
  });
})();
</script>
<!-- End UTM Capture -->
